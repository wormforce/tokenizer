name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      DOTNET_NOLOGO: true
      TEST_PROJECT: Tokenizer.Tests/Tokenizer.Tests.csproj
      TARGET_FRAMEWORK: net8.0-windows10.0.19041.0
      RUNTIME_ID: win-x64
      CONFIGURATION: Release
      PLATFORM: x64
      APP_NAME: Tokenizer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Tokenizer.sln -p:Platform=${{ env.PLATFORM }}

      - name: Build
        run: dotnet build Tokenizer.sln -c ${{ env.CONFIGURATION }} -p:Platform=${{ env.PLATFORM }} --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} -c ${{ env.CONFIGURATION }} -p:Platform=${{ env.PLATFORM }} --no-build

      - name: Assemble release payload
        shell: pwsh
        run: |
          $buildDir = Join-Path $PWD "Tokenizer.App/bin/${{ env.PLATFORM }}/${{ env.CONFIGURATION }}/${{ env.TARGET_FRAMEWORK }}/${{ env.RUNTIME_ID }}"
          $releaseDir = Join-Path $PWD "publish/${{ env.APP_NAME }}-${{ env.RUNTIME_ID }}"
          if (-not (Test-Path $buildDir)) {
            throw "Build output directory was not found: $buildDir"
          }

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $releaseDir | Out-Null
          Copy-Item -Path (Join-Path $buildDir '*') -Destination $releaseDir -Recurse -Force

          $requiredPaths = @(
            "Tokenizer.App.exe",
            "Tokenizer.App.dll",
            "Tokenizer.App.pri",
            "App.xbf",
            "MainWindow.xbf",
            "Views/TodayPage.xbf",
            "Views/HistoryPage.xbf",
            "Views/SettingsPage.xbf",
            "Assets/StoreLogo.png"
          )

          foreach ($relativePath in $requiredPaths) {
            $fullPath = Join-Path $releaseDir $relativePath
            if (-not (Test-Path $fullPath)) {
              throw "Release payload is missing required file: $relativePath"
            }
          }

      - name: Create release archive
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "publish/${{ env.APP_NAME }}-${{ env.RUNTIME_ID }}"
          $zipPath = Join-Path $PWD "publish/${{ env.APP_NAME }}-${{ env.RUNTIME_ID }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/${{ env.APP_NAME }}-${{ env.RUNTIME_ID }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
